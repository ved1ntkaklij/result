<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal | Winter Session 2025</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
    <link rel="stylesheet" href="styleee.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow elevation-2">
                <div class="card-header bg-white border-bottom-0 pt-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="w-100 text-center">
                            <h5 class="m-0 font-weight-bold text-uppercase" style="font-size: 1.1rem; color: #333;">
                                Second Year Bachelor of Computer Applications Winter Session 2025
                            </h5>
                        </div>
                        <button type="button" class="close text-danger" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>

                <div class="card-body p-4">
                    <form id="resultForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="SeatNo"><strong>Enter Seat No</strong></label>
                                <input type="text" class="form-control" id="SeatNo" placeholder="Seat Number" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="MotherName"><strong>Enter Mother Name</strong></label>
                                <input type="text" class="form-control" id="MotherName" placeholder="Mother Name" required>
                            </div>
                        </div>

                        <hr>

                       

                        <div class="text-center mt-4">
                            <a href="check_result.html"><button type="submit" class="btn btn-outline-info btn-lg px-5 elevation-2 font-weight-bold">
                                Check Result
                            </button></a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
